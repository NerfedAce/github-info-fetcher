name: python ci
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: 3.14

      - name: dependency installation
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: test-1
        run: python3 profile.py octocat

      - name: test-2
        run: python3 repo.py octocat

      - name: Build Docker Image
        run: docker build -t github-info-fetcher .



